<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鹏翔驾校 AI 助手</title>
    <style>
        /* ========== 全局 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ========== 主容器 ========== */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 780px;
            background: #fff;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 500px) {
            .app-container {
                border-radius: 16px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.1);
                height: 90vh;
            }
        }

        /* ========== 顶部栏 ========== */
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 16px 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .header p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 4px;
        }
        .header .status-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 6px;
            background: rgba(255,255,255,0.2);
        }
        .header .status-badge.online {
            background: #4caf50;
        }
        .header .status-badge.offline {
            background: #ff9800;
        }

        /* ========== 对话区域 ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fa;
        }

        /* 消息气泡 */
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            animation: msgIn 0.25s ease-out;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .message .source-tag {
            font-size: 11px;
            color: #666;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #eee;
        }
        .message .source-tag span {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-right: 4px;
        }
        .message .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }
        .message .typing-indicator span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.2s infinite;
        }
        .message .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .message .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        /* 系统提示 */
        .system-msg {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 8px;
        }

        /* ========== 底栏 ========== */
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus {
            border-color: #1a73e8;
        }
        .input-area button {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: #1a73e8;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .input-area button:active {
            background: #0d47a1;
        }
        .input-area button:disabled {
            background: #bbb;
            cursor: not-allowed;
        }

        /* ========== 建议弹出框 ========== */
        .suggestion-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: overlayIn 0.2s ease-out;
        }
        .suggestion-overlay.active {
            display: flex;
        }
        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .suggestion-card {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            animation: cardIn 0.3s ease-out;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .suggestion-card .card-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .suggestion-card .card-header .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .suggestion-card .card-header .card-title .ai-icon {
            display: inline-block;
            width: 24px; height: 24px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 6px;
            color: white;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            margin-right: 6px;
        }
        .suggestion-card .card-header .loading-spinner {
            width: 16px; height: 16px;
            border: 2px solid #e0e0e0;
            border-top: 2px solid #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .suggestion-card .card-body {
            padding: 16px 20px;
            overflow-y: auto;
            flex: 1;
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
        }
        .suggestion-card .card-body .skeleton {
            color: #999;
            font-style: italic;
        }
        .suggestion-card .card-body .source-info {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 11px;
            color: #999;
        }
        .suggestion-card .card-body .source-info span {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 1px 6px;
            border-radius: 4px;
            margin-right: 4px;
        }

        .suggestion-card .card-footer {
            padding: 12px 20px 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .suggestion-card .card-footer button {
            flex: 1;
            padding: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-card .card-footer .btn-send {
            background: #1a73e8;
            color: white;
        }
        .suggestion-card .card-footer .btn-send:active {
            background: #0d47a1;
        }
        .suggestion-card .card-footer .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }
        .suggestion-card .card-footer .btn-cancel:active {
            background: #e0e0e0;
        }
        .suggestion-card .card-footer .btn-send:disabled,
        .suggestion-card .card-footer .btn-cancel:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="app-container" id="app">

    <!-- 顶部栏 -->
    <div class="header">
        <h1>🚗 鹏翔驾校 · 小影</h1>
        <p>您的专属驾考咨询顾问</p>
        <span class="status-badge" id="statusBadge">加载中...</span>
    </div>

    <!-- 对话区域 -->
    <div class="chat-area" id="chatArea">
        <div class="system-msg">👋 你好！我是鹏翔驾校的小影，有什么关于学车的问题随时问我～</div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="模拟学员提问..." autocomplete="off"
               onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendQuestion()}">
        <button id="sendBtn" onclick="sendQuestion()">➤</button>
    </div>

    <!-- 建议弹出框 -->
    <div class="suggestion-overlay" id="suggestionOverlay">
        <div class="suggestion-card">
            <div class="card-header">
                <span class="card-title"><span class="ai-icon">🤖</span> AI 建议回复</span>
                <span class="loading-spinner" id="loadingSpinner" style="display:none;"></span>
            </div>
            <div class="card-body" id="suggestionBody">
                <span class="skeleton">正在生成回答...</span>
            </div>
            <div class="card-footer">
                <button class="btn-cancel" id="cancelBtn" onclick="cancelSuggestion()">取消</button>
                <button class="btn-send" id="sendSuggestionBtn" onclick="sendSuggestion()">发送</button>
            </div>
        </div>
    </div>

</div>

<script>
    // ============================================
    // 状态
    // ============================================
    let currentSuggestion = null;
    let isProcessing = false;
    let conversationHistory = [];
    let lastUserQuestion = '';

    // ============================================
    // 初始化
    // ============================================
    async function init() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            const badge = document.getElementById('statusBadge');
            if (data.llm_ready) {
                badge.textContent = '🟢 AI 在线 (豆包)';
                badge.className = 'status-badge online';
            } else {
                badge.textContent = '🟡 模拟模式';
                badge.className = 'status-badge offline';
            }
        } catch(e) {
            document.getElementById('statusBadge').textContent = '🔴 连接失败';
        }
    }
    init();

    // ============================================
    // 发送问题
    // ============================================
    async function sendQuestion() {
        const input = document.getElementById('userInput');
        const question = input.value.trim();
        if (!question || isProcessing) return;

        lastUserQuestion = question;
        input.value = '';
        isProcessing = true;
        document.getElementById('sendBtn').disabled = true;

        // 显示用户消息
        appendMessage('user', question);

        // 显示 AI 正在输入
        const typingId = appendTyping();

        // 显示建议弹出框
        showSuggestionLoading();

        try {
            // 构建历史（最近 3 轮）
            const recentHistory = conversationHistory.slice(-6).join('\n');

            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: question,
                    history: recentHistory
                })
            });
            const data = await res.json();

            // 移除打字指示
            removeTyping(typingId);

            if (data.error) {
                appendMessage('ai', '抱歉，出了点小问题，请稍后再试～');
                hideSuggestion();
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
                return;
            }

            // 保存到对话历史
            conversationHistory.push(`学员: ${question}`);
            conversationHistory.push(`小影: ${data.answer}`);

            // 显示建议弹出框
            showSuggestion(data.answer, data.sources);

            // 同时把 AI 回答追加到对话区
            appendMessage('ai', data.answer, data.sources);

        } catch(e) {
            removeTyping(typingId);
            appendMessage('ai', '网络好像出了点问题，请稍后再试～');
            hideSuggestion();
        }

        isProcessing = false;
        document.getElementById('sendBtn').disabled = false;
    }

    // ============================================
    // 建议弹出框
    // ============================================
    function showSuggestionLoading() {
        const overlay = document.getElementById('suggestionOverlay');
        overlay.classList.add('active');
        document.getElementById('suggestionBody').innerHTML = '<span class="skeleton">🤔 正在思考最佳回答...</span>';
        document.getElementById('loadingSpinner').style.display = 'block';
        document.getElementById('sendSuggestionBtn').disabled = true;
        document.getElementById('cancelBtn').disabled = true;
        currentSuggestion = null;
    }

    function showSuggestion(answer, sources) {
        const body = document.getElementById('suggestionBody');
        document.getElementById('loadingSpinner').style.display = 'none';

        // 来源信息
        let sourceHtml = '';
        if (sources && sources.length > 0) {
            sourceHtml = '<div class="source-info">📄 参考来源：' +
                sources.map(s => `<span>${s.replace('.md', '')}</span>`).join('') +
                '</div>';
        }

        body.innerHTML = answer + sourceHtml;
        document.getElementById('sendSuggestionBtn').disabled = false;
        document.getElementById('cancelBtn').disabled = false;
        currentSuggestion = answer;
    }

    function hideSuggestion() {
        document.getElementById('suggestionOverlay').classList.remove('active');
        currentSuggestion = null;
    }

    function cancelSuggestion() {
        hideSuggestion();
        // 聚焦输入框让用户自己输入
        document.getElementById('userInput').focus();
    }

    function sendSuggestion() {
        if (!currentSuggestion) return;
        // 把 AI 回答填入输入框
        document.getElementById('userInput').value = currentSuggestion;
        hideSuggestion();
        // 聚焦到输入框，用户可以直接点击发送（或者手动修改后发送）
        document.getElementById('userInput').focus();
        document.getElementById('userInput').setSelectionRange(
            currentSuggestion.length, currentSuggestion.length
        );
    }

    // ============================================
    // 对话气泡
    // ============================================
    function appendMessage(role, text, sources) {
        const chat = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = `message ${role}`;

        let content = text;
        if (role === 'ai' && sources && sources.length > 0) {
            content += '<div class="source-tag">📄 ' +
                sources.map(s => `<span>${s.replace('.md', '')}</span>`).join('') +
                '</div>';
        }

        div.innerHTML = content.replace(/\n/g, '<br>');
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function appendTyping() {
        const chat = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message ai';
        div.id = 'typing-' + Date.now();
        div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div.id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // ============================================
    // 点击遮罩关闭弹出框
    // ============================================
    document.getElementById('suggestionOverlay').addEventListener('click', function(e) {
        if (e.target === this && !isProcessing) {
            cancelSuggestion();
        }
    });
</script>
</body>
</html>
